# Deploy fas-app (trade-show demo) to Cloud Run.
# Same Artifact Registry repo as fas-api / fas-web: cloud-fas-api-deploy (us-west2).
# _DEPLOY_REGION: us-central1 supports custom domains; images stay in _AR_REGION.
#
# GCP UI: Cloud Build → Triggers → Create trigger → this cloudbuild.yaml
# Substitutions: _SERVICE=fas-app-dev, _DEMO_MODE=true (or false for live API)

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/fas-app/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/fas-app/${_SERVICE}:${_ENV}
      - --build-arg
      - NEXT_PUBLIC_DEMO_MODE=${_DEMO_MODE}
      - --build-arg
      - NEXT_PUBLIC_FAS_API_URL=${_FAS_API_URL}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/fas-app/${_SERVICE}

  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        cat > /workspace/fas-app-env.yaml <<EOF
        NEXT_PUBLIC_DEMO_MODE: "${_DEMO_MODE}"
        NEXT_PUBLIC_FAS_API_URL: "${_FAS_API_URL}"
        EOF
        sed -i 's/^[[:space:]]*//' /workspace/fas-app-env.yaml
        cat /workspace/fas-app-env.yaml

  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/fas-app/${_SERVICE}:$COMMIT_SHA
      - --region=${_DEPLOY_REGION}
      - --platform=managed
      - --env-vars-file=/workspace/fas-app-env.yaml
      - --set-secrets=APP_API_KEY=app-api-key:latest
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10

images:
  - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/fas-app/${_SERVICE}:$COMMIT_SHA
  - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/fas-app/${_SERVICE}:${_ENV}

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s

substitutions:
  _AR_REGION: us-west2
  _DEPLOY_REGION: us-central1
  _AR_REPO: cloud-fas-api-deploy
  _SERVICE: fas-app-dev
  _ENV: dev
  _DEMO_MODE: 'true'
  _FAS_API_URL: 'https://fas-api-695848272459.us-west2.run.app'
